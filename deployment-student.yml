apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: cloudstudents
  name: deployment-stundent-nived
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: app-stundent-nived
  replicas: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: app-stundent-nived
    spec:
      containers:
      - image: 991524241826.dkr.ecr.ap-south-2.amazonaws.com/cloudstudents/nived-student:latest
        imagePullPolicy: Always
        name: app-stundent-nived
        ports:
        - containerPort: 3001
---
apiVersion: v1
kind: Service
metadata:
  namespace: cloudstudents
  name: service-stundent-nived
spec:
  ports:
    - port: 3001
      targetPort: 3001
      protocol: TCP
  type: NodePort
  selector:
    app.kubernetes.io/name: app-stundent-nived
    
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  namespace: cloudstudents
  name: ingress-stundent-nived
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: service-stundent-nived
              port:
                number: 3001